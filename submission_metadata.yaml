# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Five-path hybrid retrieval pipeline (semantic FAISS, BM25+ontology, skill-graph traversal,
  career trajectory, behavioral signals) fused via Reciprocal Rank Fusion, then reranked by
  a cross-encoder (ms-marco-MiniLM-L-6-v2, CPU-only) over the top-120 survivors.
  Retrieval is designed around the JD's explicit insight that domain-transfer candidates
  (e.g. RecSys → IR) won't surface via keyword or dense search alone. Path 3 walks a hand-crafted
  ontology graph to rescue these Tier-5 profiles. Path 5 eliminates unreachable candidates early
  via engagement signals before the expensive cross-encoder runs.
  Composite scoring weights skill match (0.40), career quality (0.35), and behavioral availability
  (0.25). Career quality applies a hard 0.35× penalty for consulting-only backgrounds (TCS/Wipro/Infosys etc.)
  and a 1.20× bonus for product-company experience, directly reflecting the JD's stated disqualifiers.
  Honeypot detection uses five pre-computed rules (founding-date delta, expert-with-zero-duration,
  salary anomaly, skills stuffing, YOE discrepancy) cached as an O(1) registry — filtered before
  the cross-encoder to avoid wasting the rerank budget on impossible profiles.

