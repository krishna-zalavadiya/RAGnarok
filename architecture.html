  if (p.id === "P6") return C.test;
  if (p.id === "P5") return C.frontend;
  if (p.id === "P1" || p.id === "P4") return C.shared;
  if (p.id === "P2") return C.A;
  return C.B;
};

const allTasks = PHASES.flatMap(p => p.tasks.map(t => ({ ...t, phase: p.id, phaseLabel: p.label })));
const totalHours = allTasks.reduce((s, t) => s + t.hours, 0);
const hoursA = allTasks.filter(t => t.owner === "A" || t.owner === "BOTH").reduce((s, t) => s + (t.owner === "BOTH" ? t.hours / 2 : t.hours), 0);
const hoursB = allTasks.filter(t => t.owner === "B" || t.owner === "BOTH").reduce((s, t) => s + (t.owner === "BOTH" ? t.hours / 2 : t.hours), 0);

// ─── COMPONENTS ───────────────────────────────────────────────────────────────

function Tag({ label, color, small }) {
  return (
    <span style={{
      fontSize: small ? 8 : 9, fontWeight: 700, fontFamily: "monospace",
      color: color.primary,
      background: color.bg || color.dim + "33",
      border: `1px solid ${color.border || color.dim}`,
      padding: small ? "1px 5px" : "2px 7px",
      borderRadius: 5, letterSpacing: "0.06em", whiteSpace: "nowrap",
    }}>{label}</span>
  );
}

function TaskCard({ task, expanded, onToggle }) {
  const oc = ownerColor(task.owner);
  return (
    <div
      onClick={onToggle}
      style={{
        background: expanded ? oc.bg : C.card,
        border: `1px solid ${expanded ? oc.primary + "44" : C.border}`,
        borderLeft: `3px solid ${oc.primary}`,
        borderRadius: 8, padding: "10px 14px",
        cursor: "pointer", transition: "all 0.18s ease",
        marginBottom: 6,
      }}
    >
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0, paddingTop: 1 }}>
          <Tag label={ownerLabel(task.owner)} color={oc} small />
          <div style={{ fontSize: 8, color: C.text.lo, fontFamily: "monospace", textAlign: "center" }}>Day {task.day}</div>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 12, color: C.text.hi, lineHeight: 1.5, marginBottom: 4 }}>{task.task}</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {task.files.map((f, i) => (
              <span key={i} style={{ fontSize: 8, color: C.text.mid, fontFamily: "monospace", background: "#ffffff06", border: `1px solid ${C.border}`, padding: "1px 6px", borderRadius: 4 }}>{f}</span>
            ))}
          </div>
        </div>
        <div style={{ fontSize: 9, color: oc.primary, fontFamily: "monospace", flexShrink: 0 }}>{task.hours}h</div>
        <div style={{ fontSize: 10, color: C.text.lo, flexShrink: 0 }}>{expanded ? "▲" : "▼"}</div>
      </div>

      {expanded && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
          {task.deps.length > 0 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 8, color: C.text.lo, letterSpacing: "0.1em", marginBottom: 5 }}>DEPENDS ON</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {task.deps.map((d, i) => (
                  <span key={i} style={{ fontSize: 9, color: "#a78bfa", fontFamily: "monospace", background: "#a78bfa0a", border: "1px solid #a78bfa22", padding: "1px 7px", borderRadius: 4 }}>{d}</span>
                ))}
              </div>
            </div>
          )}
          <div>
            <div style={{ fontSize: 8, color: C.text.lo, letterSpacing: "0.1em", marginBottom: 5 }}>ACCEPTANCE CRITERIA</div>
            <div style={{ fontSize: 11, color: "#34d399", background: "#34d3990a", border: "1px solid #34d39922", borderRadius: 6, padding: "8px 12px", lineHeight: 1.6, fontFamily: "system-ui" }}>
              ✓ {task.acceptance}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DayTimeline({ phase }) {
  const days = [];
  for (let d = phase.dayRange[0]; d <= phase.dayRange[1]; d++) days.push(d);
  const pc = phaseColor(phase);

  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
      {days.map(d => {
        const dayTasks = phase.tasks.filter(t => t.day === d);
        const aT = dayTasks.filter(t => t.owner === "A" || t.owner === "BOTH");
        const bT = dayTasks.filter(t => t.owner === "B" || t.owner === "BOTH");
        return (
          <div key={d} style={{ background: C.surface, border: `1px solid ${pc.primary}22`, borderRadius: 8, padding: "8px 10px", minWidth: 80 }}>
            <div style={{ fontSize: 9, color: pc.primary, fontFamily: "monospace", fontWeight: 700, marginBottom: 5, textAlign: "center" }}>Day {d}</div>
            {aT.length > 0 && <div style={{ fontSize: 8, color: C.A.primary, fontFamily: "monospace", marginBottom: 2 }}>A: {aT.length} task{aT.length > 1 ? "s" : ""}</div>}
            {bT.length > 0 && <div style={{ fontSize: 8, color: C.B.primary, fontFamily: "monospace" }}>B: {bT.length} task{bT.length > 1 ? "s" : ""}</div>}
            <div style={{ marginTop: 4, height: 3, borderRadius: 2, background: `linear-gradient(to right, ${C.A.primary}, ${C.B.primary})`, opacity: 0.5 }} />
          </div>
        );
      })}
    </div>
  );
}

// ─── GANTT MINI ───────────────────────────────────────────────────────────────
function GanttStrip() {
  const totalDays = 22;
  const phaseBlocks = [
    { label: "P1 Foundation", days: [1,2], color: C.shared.primary },
    { label: "P2 Intelligence", days: [3,7], color: C.A.primary },
    { label: "P3 Scoring", days: [8,11], color: C.B.primary },
    { label: "P4 Trust+Runner", days: [12,14], color: C.shared.primary },
    { label: "P5 API+UI", days: [15,18], color: C.frontend.primary },
    { label: "P6 Test+Submit", days: [19,22], color: C.test.primary },
  ];

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "16px 20px", marginBottom: 24 }}>
      <div style={{ fontSize: 9, color: C.text.lo, letterSpacing: "0.15em", marginBottom: 12 }}>22-DAY GANTT OVERVIEW</div>

      {/* DEV A strip */}
      {["A","B"].map(dev => (
        <div key={dev} style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 9, color: dev === "A" ? C.A.primary : C.B.primary, fontFamily: "monospace", fontWeight: 700, marginBottom: 5 }}>DEV {dev}</div>
          <div style={{ display: "flex", height: 28, background: C.bg, borderRadius: 6, overflow: "hidden", position: "relative" }}>
            {Array.from({ length: totalDays }, (_, i) => {
              const day = i + 1;
              const ph = phaseBlocks.find(p => day >= p.days[0] && day <= p.days[1]);
              const tasks = allTasks.filter(t => t.day === day && (t.owner === dev || t.owner === "BOTH"));
              const hasTask = tasks.length > 0;
              return (
                <div key={day} title={`Day ${day}: ${tasks.map(t => t.task.slice(0,40)).join("; ")}`} style={{
                  flex: 1, height: "100%",
                  background: hasTask ? (ph?.color || "#ffffff") + "33" : "transparent",
                  borderRight: `1px solid ${C.border}`,
                  position: "relative", display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {hasTask && <div style={{ width: 4, height: 4, borderRadius: "50%", background: ph?.color || "#fff", opacity: 0.8 }} />}
                  {(day === 1 || day % 5 === 0 || day === 22) && (
                    <div style={{ position: "absolute", bottom: -16, fontSize: 7, color: C.text.lo, fontFamily: "monospace" }}>{day}</div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ height: 16 }} />
        </div>
      ))}

      {/* Phase legend */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
        {phaseBlocks.map((p, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: p.color + "66", border: `1px solid ${p.color}` }} />
            <span style={{ fontSize: 8, color: C.text.mid, fontFamily: "monospace" }}>{p.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function SprintPlanner() {
  const [activePhase, setActivePhase] = useState("P2");
  const [expandedTask, setExpandedTask] = useState(null);
  const [ownerFilter, setOwnerFilter] = useState("ALL");
  const [animIn, setAnimIn] = useState(false);

  useEffect(() => { setTimeout(() => setAnimIn(true), 80); }, []);

  const phase = PHASES.find(p => p.id === activePhase);
  const pc = phaseColor(phase);

  const filteredTasks = phase.tasks.filter(t =>
    ownerFilter === "ALL" || t.owner === ownerFilter || (ownerFilter === "A" && t.owner === "BOTH") || (ownerFilter === "B" && t.owner === "BOTH")
  );

  const phaseHoursA = phase.tasks.filter(t => t.owner === "A" || t.owner === "BOTH").reduce((s, t) => s + (t.owner === "BOTH" ? t.hours / 2 : t.hours), 0);
  const phaseHoursB = phase.tasks.filter(t => t.owner === "B" || t.owner === "BOTH").reduce((s, t) => s + (t.owner === "BOTH" ? t.hours / 2 : t.hours), 0);

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text.hi, fontFamily: "'Courier New', monospace" }}>

      {/* ── TOP HEADER ── */}
      <div style={{
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        padding: "18px 28px", display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap",
      }}>
        <div>
          <div style={{ fontSize: 9, color: "#00d4ff", letterSpacing: "0.25em", marginBottom: 3 }}>REDROB HACKATHON · 22-DAY SPRINT</div>
          <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: "-0.02em" }}>Sprint Planner</div>
        </div>

        <div style={{ display: "flex", gap: 24, marginLeft: 28, flexWrap: "wrap" }}>
          {[
            { label: "Total Days", val: 22, sub: "18 build + 4 test", color: "#a78bfa" },
            { label: "Total Tasks", val: allTasks.length, sub: `${totalHours}h est.`, color: "#00d4ff" },
            { label: "DEV A Hours", val: Math.round(hoursA) + "h", sub: "Pipeline & Intelligence", color: C.A.primary },
            { label: "DEV B Hours", val: Math.round(hoursB) + "h", sub: "Scoring & Infrastructure", color: C.B.primary },
          ].map((s, i) => (
            <div key={i} style={{ textAlign: "center", opacity: animIn ? 1 : 0, transition: `opacity 0.4s ease ${i * 0.1}s` }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: s.color }}>{s.val}</div>
              <div style={{ fontSize: 8, color: C.text.lo, letterSpacing: "0.08em" }}>{s.label}</div>
              <div style={{ fontSize: 7.5, color: s.color + "88" }}>{s.sub}</div>
            </div>
          ))}
        </div>

        {/* Owner legend */}
        <div style={{ marginLeft: "auto", display: "flex", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", background: C.A.bg, border: `1px solid ${C.A.border}`, borderRadius: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.A.primary }} />
            <span style={{ fontSize: 9, color: C.A.primary, fontWeight: 700 }}>DEV A — Pipeline & Intelligence</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", background: C.B.bg, border: `1px solid ${C.B.border}`, borderRadius: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.B.primary }} />
            <span style={{ fontSize: 9, color: C.B.primary, fontWeight: 700 }}>DEV B — Scoring & Infrastructure</span>
          </div>
        </div>
      </div>

      <div style={{ padding: "24px 28px", maxWidth: 1100, margin: "0 auto" }}>

        {/* Gantt */}
        <GanttStrip />

        {/* Phase tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
          {PHASES.map(p => {
            const pc2 = phaseColor(p);
            const isActive = p.id === activePhase;
            return (
              <button
                key={p.id}
                onClick={() => { setActivePhase(p.id); setExpandedTask(null); }}
                style={{
                  background: isActive ? pc2.bg : C.surface,
                  border: `1px solid ${isActive ? pc2.primary : C.border}`,
                  borderRadius: 8, padding: "8px 14px", cursor: "pointer",
                  color: isActive ? pc2.primary : C.text.mid,
                  fontSize: 10, fontWeight: isActive ? 700 : 400,
                  fontFamily: "monospace", letterSpacing: "0.04em",
                  transition: "all 0.15s ease",
                  boxShadow: isActive ? `0 0 14px ${pc2.primary}22` : "none",
                }}
              >
                <div>{p.id}</div>
                <div style={{ fontSize: 8, opacity: 0.7 }}>{p.days}</div>
              </button>
            );
          })}
        </div>

        {/* Phase header */}
        <div style={{
          background: pc.bg || C.card, border: `1px solid ${pc.primary}33`,
          borderRadius: 12, padding: "18px 22px", marginBottom: 16,
          display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap",
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: pc.primary, letterSpacing: "0.15em", marginBottom: 4 }}>{phase.days}</div>
            <div style={{ fontSize: 17, fontWeight: 900, marginBottom: 8 }}>{phase.label}</div>
            <div style={{ fontSize: 12, color: C.text.mid, lineHeight: 1.7, fontFamily: "system-ui" }}>{phase.desc}</div>
          </div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {[
              { label: "DEV A", val: Math.round(phaseHoursA) + "h", color: C.A.primary },
              { label: "DEV B", val: Math.round(phaseHoursB) + "h", color: C.B.primary },
              { label: "Tasks", val: phase.tasks.length, color: pc.primary },
            ].map((s, i) => (
              <div key={i} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 14px", textAlign: "center" }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: s.color }}>{s.val}</div>
                <div style={{ fontSize: 8, color: C.text.lo }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Day timeline */}
        <DayTimeline phase={phase} />

        {/* Owner filter */}
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {["ALL", "A", "B", "BOTH"].map(f => (
            <button key={f} onClick={() => setOwnerFilter(f)} style={{
              background: ownerFilter === f ? (f === "A" ? C.A.bg : f === "B" ? C.B.bg : C.shared.bg) : C.surface,
              border: `1px solid ${ownerFilter === f ? (f === "A" ? C.A.primary : f === "B" ? C.B.primary : "#a78bfa") : C.border}`,
              borderRadius: 6, padding: "5px 12px", cursor: "pointer",
              color: ownerFilter === f ? (f === "A" ? C.A.primary : f === "B" ? C.B.primary : "#a78bfa") : C.text.lo,
              fontSize: 9, fontFamily: "monospace", fontWeight: 700,
              transition: "all 0.12s ease",
            }}>{f === "ALL" ? "All Tasks" : f === "BOTH" ? "Shared" : `DEV ${f} Only`}</button>
          ))}
        </div>

        {/* Task list */}
        <div>
          {filteredTasks.map((task, i) => (
            <div key={i} style={{ opacity: animIn ? 1 : 0, transform: animIn ? "none" : "translateY(6px)", transition: `all 0.3s ease ${i * 0.03}s` }}>
              <TaskCard
                task={task}
                expanded={expandedTask === i}
                onToggle={() => setExpandedTask(expandedTask === i ? null : i)}
              />
            </div>
          ))}
        </div>

        {/* Risk flags */}
        <div style={{ marginTop: 28, background: C.card, border: `1px solid #ff6b6b22`, borderRadius: 10, padding: "16px 20px" }}>
          <div style={{ fontSize: 9, color: "#ff6b6b", letterSpacing: "0.15em", marginBottom: 12 }}>⚠ DEPENDENCY RISK FLAGS</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {[
              { risk: "DEV B's faiss_builder.py (Day 5) blocks DEV A's semantic_path.py (Day 6)", sev: "HIGH", mit: "DEV A can use mock index stub on Day 6 if FAISS not ready; swap in real index Day 7" },
              { risk: "pipeline/schemas.py (Day 2, BOTH) is depended on by nearly everything", sev: "HIGH", mit: "This is the Phase 1 priority — must be finalized before anyone branches" },
              { risk: "ontology/skill_map.json (Day 3, DEV A) blocks DEV B's bm25_builder.py expansion", sev: "MED", mit: "DEV B uses raw token BM25 on Day 6; DEV A hands off skill_map.json by EOD Day 3" },
              { risk: "trust/reasoning_generator.py quality determines Stage 4 score — needs real iteration", sev: "MED", mit: "DEV A allocates Day 19 hallucination audit specifically to this; weight calibration Day 20" },
              { risk: "Sandbox deployment (Day 17) may hit HuggingFace resource limits on CPU", sev: "LOW", mit: "Pre-test with 10-candidate sample; if too slow, deploy to Streamlit Cloud or Replit" },
            ].map((r, i) => (
              <div key={i} style={{ display: "flex", gap: 12, padding: "10px 14px", background: C.bg, borderRadius: 8, border: `1px solid ${r.sev === "HIGH" ? "#ff6b6b33" : r.sev === "MED" ? "#f59e0b33" : "#34d39933"}` }}>
                <div style={{ fontSize: 8, fontWeight: 700, color: r.sev === "HIGH" ? "#ff6b6b" : r.sev === "MED" ? "#f59e0b" : "#34d399", fontFamily: "monospace", minWidth: 32 }}>{r.sev}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: C.text.hi, marginBottom: 4, lineHeight: 1.5 }}>{r.risk}</div>
                  <div style={{ fontSize: 10, color: C.text.mid, fontFamily: "system-ui" }}>→ {r.mit}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SprintPlanner />);
</script>
</body>
</html>
